<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Spin Wheel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            color-scheme: light !important;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .wheel-modal {
            display: flex !important;
            position: relative !important;
            background: transparent !important;
            width: min(85vw, 75vh);
            height: min(85vw, 75vh);
        }

        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ffffff;
            box-shadow: 0 0 0 4px #e1e8ed, 0 15px 50px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            overflow: hidden;
            background: white;
        }

        .wheel svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 40px solid #ff4757;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            z-index: 10;
        }

        .wheel-spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(16vw, 14vh, 90px);
            height: min(16vw, 14vh, 90px);
            background: white;
            border: 5px solid #ff4757;
            color: #ff4757;
            border-radius: 50%;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: 900;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
        }

        .wheel-spin-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .wheel-spin-btn:disabled {
            border-color: #ccc;
            color: #aaa;
            cursor: not-allowed;
        }

        .fullscreen-result {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
        }

        .fullscreen-result.active {
            display: flex;
        }

        .fullscreen-result .result-text {
            font-size: clamp(100px, 30vw, 250px);
            font-weight: 900;
            text-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes burstIn {
            0% { opacity: 0; transform: scale(0.2) rotate(-15deg); }
            60% { opacity: 1; transform: scale(1.1) rotate(5deg); }
            80% { transform: scale(0.95) rotate(-2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes fadeInPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .fullscreen-result.active .result-text {
            animation: burstIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .fullscreen-result .tap-continue {
            margin-top: 30px;
            font-size: 24px;
            color: #888;
            font-weight: bold;
            opacity: 0;
            animation: fadeInPulse 2s infinite;
            animation-delay: 1s;
        }

        .spin-again-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .spin-again-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <a class="back-btn" href="index.html">← Back</a>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="wheel-modal" id="wheelModal">
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel"></div>
            <button class="wheel-spin-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
        </div>
    </div>

    <div id="fullscreenResult" class="fullscreen-result" onclick="handleOverlayClick(event)">
        <div id="fsResultText" class="result-text">+3</div>
        <button id="spinAgainBtn" class="spin-again-btn" onclick="spinWheelAgain(event)">Spin again</button>
        <div class="tap-continue">Tap outside to close</div>
    </div>

    <script>
        // Audio
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function soundTick() { playTone(800, 'triangle', 0.05, 0.05); }
        function soundPop() { playTone(400, 'sine', 0.15, 0.2); }
        function soundNeutral() { playTone(300, 'triangle', 0.2, 0.15); }

        function soundWin() {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = [440, 554.37, 659.25, 880];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, now + i*0.1);
                gain.gain.linearRampToValueAtTime(0.15, now + i*0.1 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.3);
            });
        }

        function soundLose() {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.5);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.5);
        }

        document.body.addEventListener('click', initAudio, { once: true });
        document.body.addEventListener('touchstart', initAudio, { once: true });

        // Wheel
        const wheelSegments = ['+1', '+2', '+1', '+3', '+1', '0', '+2', '-1', '+1', '+3', '+2', '0'];
        const friendlyColors = {
            '+3': '#f1c40f',
            '+2': '#2ecc71',
            '+1': '#3498db',
            '0':  '#9b59b6',
            '-1': '#e74c3c'
        };

        let currentRotation = 0;
        let isSpinning = false;
        let tickInterval;

        function createWheel() {
            const wheel = document.getElementById('wheel');
            const numSegments = wheelSegments.length;
            const TWO_PI = 2 * Math.PI;
            const segmentAngle = TWO_PI / numSegments;
            const cx = 150, cy = 150, r = 148;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 300 300');

            wheelSegments.forEach((value, index) => {
                const startAngle = index * segmentAngle - Math.PI / 2;
                const endAngle = (index + 1) * segmentAngle - Math.PI / 2;

                const x1 = cx + r * Math.cos(startAngle);
                const y1 = cy + r * Math.sin(startAngle);
                const x2 = cx + r * Math.cos(endAngle);
                const y2 = cy + r * Math.sin(endAngle);

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute('fill', friendlyColors[value]);
                path.setAttribute('stroke', '#ffffff');
                path.setAttribute('stroke-width', '2');
                svg.appendChild(path);

                const midAngle = startAngle + segmentAngle / 2;
                const textR = r * 0.70;
                const tx = cx + textR * Math.cos(midAngle);
                const ty = cy + textR * Math.sin(midAngle);
                const rotateDeg = (midAngle * 180 / Math.PI) + 90;

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', tx);
                text.setAttribute('y', ty);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'central');
                text.setAttribute('fill', 'white');
                text.setAttribute('font-size', value === '+3' ? '24' : '20');
                text.setAttribute('font-weight', '900');
                text.setAttribute('transform', `rotate(${rotateDeg}, ${tx}, ${ty})`);
                text.setAttribute('style', 'text-shadow: 1px 1px 3px rgba(0,0,0,0.3);');
                text.textContent = value;
                svg.appendChild(text);
            });

            wheel.innerHTML = '';
            wheel.appendChild(svg);
        }

        function spinWheel() {
            if (isSpinning) return;
            initAudio();
            
            isSpinning = true;
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;

            const targetIndex = Math.floor(Math.random() * 12);
            const finalResult = wheelSegments[targetIndex];
            
            const segmentAngle = 360 / 12;
            const targetAngle = 360 - (targetIndex * segmentAngle) - (segmentAngle / 2);
            
            const spins = 5;
            const newRotation = currentRotation + (spins * 360) + targetAngle - (currentRotation % 360);
            currentRotation = newRotation;
            
            wheel.style.transform = `rotate(${newRotation}deg)`;

            let ticks = 0;
            const maxTicks = 20;
            tickInterval = setInterval(() => {
                soundTick();
                ticks++;
                if (ticks >= maxTicks) clearInterval(tickInterval);
            }, 180);

            setTimeout(() => {
                clearInterval(tickInterval);
                
                const fsOverlay = document.getElementById('fullscreenResult');
                const fsText = document.getElementById('fsResultText');
                
                fsText.textContent = finalResult;
                fsText.style.color = friendlyColors[finalResult];
                fsOverlay.classList.add('active');

                if (finalResult === '+2' || finalResult === '+3') {
                    soundWin();
                } else if (finalResult === '-1') {
                    soundLose();
                } else if (finalResult === '+1') {
                    soundPop();
                } else {
                    soundNeutral();
                }

                spinBtn.disabled = false;
                spinBtn.textContent = 'AGAIN';
                isSpinning = false;
            }, 4000);
        }

        function spinWheelAgain(event) {
            event.stopPropagation();
            document.getElementById('fullscreenResult').classList.remove('active');
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = false;
            spinBtn.textContent = 'SPIN';
            isSpinning = false;
            createWheel();
        }

        function handleOverlayClick(event) {
            if (event.target.id === 'fullscreenResult' || event.target.classList.contains('tap-continue')) {
                document.getElementById('fullscreenResult').classList.remove('active');
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        createWheel();
    </script>
</body>
</html>
