<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced NKRO & HID Key Tester</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --accent: #00e676;
            --accent-dim: rgba(0, 230, 118, 0.2);
            --danger: #ff5252;
            --border: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 1.2rem;
            color: var(--text);
            cursor: pointer;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { text-align: center; font-weight: 300; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9em; }
        
        /* Dashboard Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .panel {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .panel h2 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Hero Key Display */
        #hero-key { font-size: 3em; font-weight: bold; color: var(--accent); text-align: center; min-height: 1.2em; }
        #hero-code { text-align: center; font-family: monospace; color: #aaa; font-size: 1.2em; }

        /* NKRO Active Keys */
        #active-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 50px;
        }
        .key-badge {
            background-color: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
            box-shadow: 0 0 10px var(--accent-dim);
        }

        /* History Table */
        table { width: 100%; border-collapse: collapse; background-color: var(--surface); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-family: monospace; }
        th { background-color: #2a2a2a; color: #fff; font-family: sans-serif; }
        tr.keydown { color: var(--accent); }
        tr.keyup { color: #888; }
        tr:hover { background-color: #252525; }
        .event-type { font-weight: bold; }
        
        .controls { display: flex; justify-content: space-between; margin-bottom: 10px; }
        button { background-color: #333; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #444; }

        /* Force Landscape View */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(-90deg);
                transform-origin: center center;
                width: 100vh !important;
                height: 100vw !important;
                overflow: hidden;
            }
            .dashboard {
                grid-template-columns: 1fr 1fr !important;
                flex-direction: row !important;
            }
        }
    </style>
</head>
<body>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
    <h1>Advanced Key Tester</h1>
    <div class="subtitle">Designed for testing Custom HID Descriptors, NKRO, and F13-F24 keys.</div>

    <div class="dashboard">
        <div class="panel">
            <h2>Last Event</h2>
            <div id="hero-key">Waiting...</div>
            <div id="hero-code">Press any key</div>
        </div>
        <div class="panel">
            <h2>Currently Pressed (NKRO) <span id="nkro-count" style="float:right; color:#888;">0</span></h2>
            <div id="active-keys"></div>
        </div>
    </div>

    <div class="controls">
        <label><input type="checkbox" id="prevent-default" checked> Prevent Browser Defaults (Recommended)</label>
        <button onclick="clearHistory()">Clear History</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Event</th>
                <th>event.key</th>
                <th>event.code</th>
                <th>keyCode</th>
                <th>Modifiers</th>
            </tr>
        </thead>
        <tbody id="history-body">
            </tbody>
    </table>
</div>

<script>
    const activeKeysMap = new Map();
    const activeKeysContainer = document.getElementById('active-keys');
    const heroKey = document.getElementById('hero-key');
    const heroCode = document.getElementById('hero-code');
    const historyBody = document.getElementById('history-body');
    const nkroCount = document.getElementById('nkro-count');
    const preventDefaultCheckbox = document.getElementById('prevent-default');

    let eventCount = 0;

    function updateActiveKeysUI() {
        activeKeysContainer.innerHTML = '';
        activeKeysMap.forEach((keyData, code) => {
            const badge = document.createElement('div');
            badge.className = 'key-badge';
            badge.textContent = keyData.key === ' ' ? 'Space' : keyData.key;
            activeKeysContainer.appendChild(badge);
        });
        nkroCount.textContent = activeKeysMap.size;
    }

    function getModifiers(e) {
        let mods = [];
        if (e.ctrlKey) mods.push('Ctrl');
        if (e.shiftKey) mods.push('Shift');
        if (e.altKey) mods.push('Alt');
        if (e.metaKey) mods.push('Meta');
        return mods.length > 0 ? mods.join('+') : 'None';
    }

    function logEvent(e, type) {
        // Update Hero UI
        heroKey.textContent = e.key === ' ' ? 'Space' : e.key;
        heroCode.textContent = e.code;
        if (type === 'keyup') heroKey.style.color = '#888';
        else heroKey.style.color = 'var(--accent)';

        // Add to history table
        const row = document.createElement('tr');
        row.className = type;
        
        let keyDisplay = e.key === ' ' ? 'Space' : e.key;
        if (keyDisplay === '') keyDisplay = 'Unidentified';

        row.innerHTML = `
            <td class="event-type">${type}</td>
            <td>${keyDisplay}</td>
            <td>${e.code}</td>
            <td>${e.keyCode}</td>
            <td>${getModifiers(e)}</td>
        `;

        historyBody.insertBefore(row, historyBody.firstChild);
        
        // Keep history manageable
        eventCount++;
        if (eventCount > 50) {
            historyBody.removeChild(historyBody.lastChild);
        }
    }

    window.addEventListener('keydown', (e) => {
        if (preventDefaultCheckbox.checked) {
            // Allow Ctrl+Shift+I / F12 for dev tools if needed, block the rest
            if (e.code !== 'F12' && !(e.ctrlKey && e.shiftKey && e.code === 'KeyI')) {
                e.preventDefault(); 
            }
        }
        
        // Prevent auto-repeat from flooding the history if the key is held down
        if (!e.repeat) {
            activeKeysMap.set(e.code, { key: e.key, code: e.code });
            updateActiveKeysUI();
            logEvent(e, 'keydown');
        }
    });

    window.addEventListener('keyup', (e) => {
        if (preventDefaultCheckbox.checked) {
            e.preventDefault();
        }
        
        activeKeysMap.delete(e.code);
        updateActiveKeysUI();
        logEvent(e, 'keyup');
    });

    // Handle case where window loses focus while keys are held down
    window.addEventListener('blur', () => {
        activeKeysMap.clear();
        updateActiveKeysUI();
    });

    function clearHistory() {
        historyBody.innerHTML = '';
        eventCount = 0;
        heroKey.textContent = 'Waiting...';
        heroCode.textContent = 'Press any key';
        heroKey.style.color = 'var(--accent)';
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    }
</script>

</body>
</html>
