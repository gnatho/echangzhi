<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Bumpers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== MENU OVERLAY ===== -->
    <div id="menu-overlay">
        <div class="menu-bg"></div>

        <div class="menu-title">ARCADE BUMPERS</div>
        <div class="menu-subtitle">Bumper Car Battle Arena</div>

        <div class="section-label">Number of Players</div>
        <div class="player-buttons">
            <button class="player-btn" data-players="2">2</button>
            <button class="player-btn selected" data-players="3">3</button>
            <button class="player-btn" data-players="4">4</button>
        </div>

        <div class="section-label">Score to Win</div>
        <div class="score-buttons">
            <button class="score-btn" data-score="5">5</button>
            <button class="score-btn selected" data-score="10">10</button>
            <button class="score-btn" data-score="15">15</button>
            <button class="score-btn" data-score="20">20</button>
        </div>

        <div class="controls-preview">
            <h3>Controls</h3>
            <div id="controls-list"></div>
        </div>

        <div class="pup-legend">
            <div class="pup-item"><span class="pup-icon">⚡</span> Speed</div>
            <div class="pup-item"><span class="pup-icon">⬡</span> Shield</div>
            <div class="pup-item"><span class="pup-icon">~</span> Confusion</div>
            <div class="pup-item"><span class="pup-icon">✦</span> Bomb</div>
        </div>

        <button id="start-btn" class="start-btn">START GAME</button>
    </div>

    <!-- ===== WIN OVERLAY ===== -->
    <div id="win-overlay" class="hidden">
        <div class="win-box">
            <div class="win-trophy">🏆</div>
            <div class="win-title">Winner!</div>
            <div id="win-player">PLAYER 1</div>
            <div id="win-score">10 POINTS</div>
            <div class="win-btns">
                <button class="win-btn win-btn-primary" id="btn-restart">PLAY AGAIN</button>
                <button class="win-btn win-btn-secondary" id="btn-menu">MENU</button>
            </div>
        </div>
    </div>

    <!-- ===== COUNTDOWN ===== -->
    <div id="countdown" class="hidden">3</div>

    <!-- ===== HUD ===== -->
    <div class="hud">
        <div class="player-card hidden" id="p1-card">
            <div class="player-name" id="p1-name">PLAYER 1</div>
            <div class="score" id="p1-score">0</div>
            <div class="controls-hint" id="p1-hint"></div>
        </div>

        <div class="player-card hidden" id="p2-card">
            <div class="player-name" id="p2-name">PLAYER 2</div>
            <div class="score" id="p2-score">0</div>
            <div class="controls-hint" id="p2-hint"></div>
        </div>

        <div class="hud-center">
            <button id="fullscreen-btn" class="fullscreen-btn">⛶</button>
        </div>

        <div class="player-card hidden" id="p3-card">
            <div class="player-name" id="p3-name">PLAYER 3</div>
            <div class="score" id="p3-score">0</div>
            <div class="controls-hint" id="p3-hint"></div>
        </div>

        <div class="player-card hidden" id="p4-card">
            <div class="player-name" id="p4-name">PLAYER 4</div>
            <div class="score" id="p4-score">0</div>
            <div class="controls-hint" id="p4-hint"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="controls.js"></script>
    <script src="game.js"></script>

</body>
</html>
