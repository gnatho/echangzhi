<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced NKRO Arcade Bumpers</title>
    <style>
        body { 
            background: #050505; color: #fff; margin: 0; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        canvas { display: block; }
        .hud { 
            position: absolute; top: 20px; width: 100%; 
            display: flex; justify-content: space-around; pointer-events: none; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .player-card { 
            background: rgba(20, 20, 20, 0.85); padding: 15px 30px; 
            border-radius: 8px; border: 2px solid; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #p1-card { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        #p2-card { border-color: #ff00ff; color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.3); }
        .score { font-size: 32px; font-weight: bold; font-family: monospace; }
        .controls-hint { font-size: 11px; color: #888; margin-top: 5px; letter-spacing: 1px;}
    </style>
</head>
<body>

    <div class="hud">
        <div class="player-card" id="p1-card">
            <div>PLAYER 1</div>
            <div class="score" id="p1-score">0</div>
            <div class="controls-hint">A:GAS | B:LEFT | C:RIGHT | D:REV</div>
        </div>
        <div class="player-card" id="p2-card">
            <div>PLAYER 2</div>
            <div class="score" id="p2-score">0</div>
            <div class="controls-hint">F:GAS | G:LEFT | H:RIGHT | I:REV</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- INPUT HANDLING ---
    // We convert everything to lowercase to ignore CapsLock issues
    const pressedKeys = new Set();
    window.addEventListener("keydown", (e) => { pressedKeys.add(e.key.toLowerCase()); e.preventDefault(); });
    window.addEventListener("keyup", (e) => { pressedKeys.delete(e.key.toLowerCase()); e.preventDefault(); });

    // --- GAME ENGINE CLASSES ---
    class Particle {
        constructor(x, y, color, speed) {
            this.x = x; this.y = y; this.color = color;
            let angle = Math.random() * Math.PI * 2;
            let vel = Math.random() * speed;
            this.vx = Math.cos(angle) * vel; this.vy = Math.sin(angle) * vel;
            this.life = 1.0; this.decay = Math.random() * 0.05 + 0.02;
            this.size = Math.random() * 3 + 1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.life -= this.decay;
        }
        draw(ctx) {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1.0;
        }
    }

    class Car {
        constructor(x, y, color, keys) {
            this.x = x; this.y = y; this.color = color; this.keys = keys;
            this.vx = 0; this.vy = 0; this.angle = -Math.PI/2;
            this.width = 24; this.length = 40; this.score = 0;
            this.accel = 0.5; this.friction = 0.96; this.grip = 0.85; 
            this.turnSpeed = 0.07; this.radius = 20; // For collisions
        }

        update() {
            // Steering
            let speed = Math.hypot(this.vx, this.vy);
            if (speed > 0.2) {
                let dir = (this.vx * Math.cos(this.angle) + this.vy * Math.sin(this.angle)) > 0 ? 1 : -1;
                if (pressedKeys.has(this.keys.left)) this.angle -= this.turnSpeed * dir;
                if (pressedKeys.has(this.keys.right)) this.angle += this.turnSpeed * dir;
            }

            // Gas & Reverse
            if (pressedKeys.has(this.keys.gas)) {
                this.vx += Math.cos(this.angle) * this.accel;
                this.vy += Math.sin(this.angle) * this.accel;
            }
            if (pressedKeys.has(this.keys.rev)) {
                this.vx -= Math.cos(this.angle) * (this.accel * 0.6);
                this.vy -= Math.sin(this.angle) * (this.accel * 0.6);
            }

            // Apply Grip (Lateral Friction to stop endless sliding)
            let fwdX = Math.cos(this.angle); let fwdY = Math.sin(this.angle);
            let rightX = Math.cos(this.angle + Math.PI/2); let rightY = Math.sin(this.angle + Math.PI/2);
            let forwardVelocity = this.vx * fwdX + this.vy * fwdY;
            let rightVelocity = this.vx * rightX + this.vy * rightY;
            
            // Kill lateral velocity based on grip
            rightVelocity *= this.grip; 
            
            // Reconstruct velocity vectors
            this.vx = fwdX * forwardVelocity + rightX * rightVelocity;
            this.vy = fwdY * forwardVelocity + rightY * rightVelocity;

            // General drag
            this.vx *= this.friction; this.vy *= this.friction;
            this.x += this.vx; this.y += this.vy;

            // Screen Wrap
            if (this.x < -20) this.x = canvas.width + 20; if (this.x > canvas.width + 20) this.x = -20;
            if (this.y < -20) this.y = canvas.height + 20; if (this.y > canvas.height + 20) this.y = -20;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // Car Body
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color; ctx.shadowBlur = 10;
            ctx.fillRect(-this.length/2, -this.width/2, this.length, this.width);

            // Windshield
            ctx.shadowBlur = 0; ctx.fillStyle = '#000';
            ctx.fillRect(0, -this.width/2 + 2, 10, this.width - 4);
            
            // Headlights
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.length/2 - 4, -this.width/2 + 2, 4, 6);
            ctx.fillRect(this.length/2 - 4, this.width/2 - 8, 4, 6);

            ctx.restore();
        }
    }

    // --- GAME STATE ---
    const p1 = new Car(canvas.width * 0.3, canvas.height/2, '#00ff88', { gas: 'd', left: 'e', right: 'b', rev: 'c' });
    const p2 = new Car(canvas.width * 0.7, canvas.height/2, '#ff00ff', { gas: 'i', left: 'j', right: 'g', rev: 'h' });
    p2.angle = -Math.PI/2; p1.angle = -Math.PI/2;

    let particles = [];
    let box = { x: canvas.width/2, y: canvas.height/2, size: 20, color: '#ffea00', pulse: 0 };

    function spawnBox() {
        box.x = 50 + Math.random() * (canvas.width - 100);
        box.y = 50 + Math.random() * (canvas.height - 100);
    }

    function createExplosion(x, y, color, amount, maxSpeed) {
        for(let i=0; i<amount; i++) particles.push(new Particle(x, y, color, maxSpeed));
    }

    function checkCarCollision(c1, c2) {
        let dx = c2.x - c1.x; let dy = c2.y - c1.y;
        let dist = Math.hypot(dx, dy);
        let minDist = c1.radius + c2.radius;

        if (dist < minDist) {
            // 1. Separate them so they don't get stuck
            let overlap = minDist - dist;
            let nx = dx / dist; let ny = dy / dist;
            c1.x -= nx * overlap / 2; c1.y -= ny * overlap / 2;
            c2.x += nx * overlap / 2; c2.y += ny * overlap / 2;

            // 2. Elastic Bounce (Swap momentum)
            let p = 2 * (c1.vx * nx + c1.vy * ny - c2.vx * nx - c2.vy * ny) / 2;
            c1.vx -= p * nx; c1.vy -= p * ny;
            c2.vx += p * nx; c2.vy += p * ny;

            // 3. Visual Sparks!
            createExplosion(c1.x + dx/2, c1.y + dy/2, '#fff', 15, 8);
        }
    }

    function checkBoxCollision(car) {
        let dx = box.x - car.x; let dy = box.y - car.y;
        if (Math.hypot(dx, dy) < car.radius + box.size/2) {
            car.score++;
            createExplosion(box.x, box.y, box.color, 40, 12);
            spawnBox();
            return true;
        }
        return false;
    }

    // --- MAIN LOOP ---
    function update() {
        p1.update();
        p2.update();

        checkCarCollision(p1, p2);
        
        if (checkBoxCollision(p1)) document.getElementById('p1-score').innerText = p1.score;
        if (checkBoxCollision(p2)) document.getElementById('p2-score').innerText = p2.score;

        particles.forEach(p => p.update());
        particles = particles.filter(p => p.life > 0);

        box.pulse += 0.1;
    }

    function draw() {
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid lines for speed illusion
        ctx.strokeStyle = '#151515'; ctx.lineWidth = 2;
        for(let i=0; i<canvas.width; i+=80) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=80) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

        // Draw Collectible Box
        ctx.save();
        ctx.translate(box.x, box.y);
        ctx.scale(1 + Math.sin(box.pulse)*0.2, 1 + Math.sin(box.pulse)*0.2);
        ctx.shadowBlur = 20; ctx.shadowColor = box.color; ctx.fillStyle = box.color;
        ctx.rotate(box.pulse * 0.5);
        ctx.fillRect(-box.size/2, -box.size/2, box.size, box.size);
        ctx.restore();

        p1.draw(ctx);
        p2.draw(ctx);

        particles.forEach(p => p.draw(ctx));
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
