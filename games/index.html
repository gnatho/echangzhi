<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Game Chooser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            color-scheme: light !important;
        }

        @media (prefers-color-scheme: dark) {
            html { color-scheme: light !important; }
            body { background-color: #f0f4f8 !important; color: #2c3e50 !important; }
        }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            z-index: 100;
        }

        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            z-index: 100;
            text-decoration: none;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 900px;
            width: 90%;
            padding: 20px;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            text-decoration: none;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            aspect-ratio: 1;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .game-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .card-icon {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
        }

        .card-icon.car { background: linear-gradient(135deg, #0f0f0f, #1a1a2e); }
        .card-icon.chooser { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card-icon.memory { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .card-icon.shooter { background: linear-gradient(135deg, #0a0c0f, #1a2a1a); }

        /* Force Landscape View */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(-90deg);
                transform-origin: center center;
                width: 100vh !important;
                height: 100vw !important;
                overflow: hidden;
            }
            .games-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

        @media (max-width: 600px) {
            .games-grid { gap: 16px; }
            .card-icon { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <a class="back-btn" href="../index.html">← Back</a>

    <div class="games-grid">
        <a class="game-card" href="car/index.html">
            <div class="card-icon car">🏎️</div>
        </a>

        <a class="game-card" href="chooser/index.html">
            <div class="card-icon chooser">🎯</div>
        </a>

        <a class="game-card" href="memory/index.html">
            <div class="card-icon memory">🧩</div>
        </a>

        <a class="game-card" href="shooter/index.html">
            <div class="card-icon shooter">🔫</div>
        </a>

        <a class="game-card" href="snakes/index.html">
            <div class="card-icon" style="background: linear-gradient(135deg, #1a5a1a, #2d8a2d);">🐍</div>
        </a>

        <a class="game-card" href="bomberman/index.html">
            <div class="card-icon" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">💣</div>
        </a>
    </div>

    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
