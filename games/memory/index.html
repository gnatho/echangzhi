<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Game Deluxe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="back-btn" onclick="window.location.href='../index.html'">← Back</button>

    <div id="menu-screen" class="screen active">
        <div class="menu-card">
            <h1>🧩 Memory</h1>
            <p>Match all pairs!</p>
            
            <div class="difficulty-selector">
                <button class="btn primary" onclick="startGame('easy')">Easy</button>
                <button class="btn primary" onclick="startGame('medium')">Medium</button>
                <button class="btn primary" onclick="startGame('hard')">Hard (30)</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <span class="stat">Score: <span id="score">0</span></span>
            <span class="stat">Pairs: <span id="pairs">0</span>/<span id="total-pairs">15</span></span>
        </div>

        <div id="game-container">
            <div id="memory-grid"></div>
        </div>
    </div>

    <div id="result-overlay">
        <div id="result-content" class="glass-panel">
            <h1 id="result-title">🎉 You Win!</h1>
            <p id="result-message">Fantastic memory!</p>
            <p class="final-stat">Final Score: <span id="final-score">0</span></p>
            <div class="result-actions">
                <button class="btn primary" onclick="returnToMenu()">Menu</button>
                <button class="btn secondary" id="play-again-btn" onclick="restartCurrentGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
