<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Game Deluxe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="back-btn" onclick="window.location.href='../index.html'">← Back</button>

    <div id="menu-screen" class="screen active">
        <div class="menu-card glass-panel">
            <h1>🧩 Memory Deluxe</h1>
            <p>Test your brain. Beat the clock.</p>
            
            <div class="level-unit-selector">
                <div class="selector-row">
                    <label for="level-select">Level:</label>
                    <select id="level-select" onchange="onLevelChange()">
                        <option value="">Select Level</option>
                    </select>
                </div>
                <div class="selector-row">
                    <label for="unit-select">Unit:</label>
                    <select id="unit-select" onchange="onUnitChange()">
                        <option value="">Select Unit</option>
                    </select>
                </div>
            </div>
            
            <div class="timer-setting">
                <label>
                    <input type="checkbox" id="timer-enabled" checked>
                    <span>Enable Timer</span>
                </label>
            </div>
            
            <div class="difficulty-selector">
                <h2>Select Difficulty</h2>
                <button class="btn primary" onclick="startGame('easy')">Easy (4x3)</button>
                <button class="btn primary" onclick="startGame('medium')">Medium (4x4)</button>
                <button class="btn primary" onclick="startGame('hard')">Hard (6x5)</button>
            </div>
            
            <div class="controls-info">
                <p>🎵 Sound effects are generated in real-time!</p>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud" class="glass-panel">
            <button class="btn icon-btn" onclick="returnToMenu()" title="Back to Menu">🔙</button>
            <div class="stats-container">
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat">Pairs: <span id="pairs">0</span>/<span id="total-pairs">15</span></div>
            </div>
            <button id="fullscreen-btn" class="btn icon-btn" title="Toggle Fullscreen">⛶</button>
        </div>

        <div id="timer-container">
            <div id="timer-bar"></div>
            <div id="timer-text">45</div>
        </div>

        <div id="game-container">
            <div id="memory-grid"></div>
        </div>
    </div>

    <div id="result-overlay">
        <div id="result-content" class="glass-panel">
            <h1 id="result-title">🎉 You Win!</h1>
            <p id="result-message">Fantastic memory!</p>
            <p class="final-stat">Final Score: <span id="final-score">0</span></p>
            <div class="result-actions">
                <button class="btn primary" onclick="returnToMenu()">Menu</button>
                <button class="btn secondary" id="play-again-btn" onclick="restartCurrentGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="../../data/level_words.js"></script>
    <script src="script.js"></script>
</body>
</html>
