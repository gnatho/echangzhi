<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Bomber Battle - Multiplayer</title>
    <link rel="stylesheet" href="bomberman.css">
</head>
<body>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div id="start-screen" class="screen active">
        <div class="start-container">
            <div class="game-logo">💣</div>
            <h1>Bomber Battle</h1>
            <p class="subtitle">Multiplayer Bomb Arena</p>
            
            <div class="config-section">
                <div class="config-group">
                    <label>Number of Players:</label>
                    <select id="num-players">
                        <option value="2" selected>2 Players</option>
                        <option value="3">3 Players</option>
                        <option value="4">4 Players</option>
                    </select>
                </div>
            </div>
            
            <div class="players-preview">
                <h3>Select Characters</h3>
                <div class="player-selectors" id="player-selectors"></div>
            </div>
            
            <button id="start-btn" class="start-btn">Start Game</button>
            <button id="controls-btn" class="controls-btn">Configure Controls</button>
            <a href="../game/" class="back-btn">← Back to Games</a>
        </div>
    </div>
    
    <div id="controls-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configure Controls</h2>
                <button id="close-controls" class="close-modal">&times;</button>
            </div>
            <div class="modal-body" id="controls-config"></div>
            <div class="modal-footer">
                <button id="reset-controls" class="reset-btn">Reset to Defaults</button>
                <button id="save-controls" class="save-btn">Save</button>
            </div>
        </div>
    </div>
        </div>
    </div>
    
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="game-title">💣 Bomber Battle</div>
            <div class="game-hud" id="players-hud"></div>
            <div class="header-right">
                <div class="game-status" id="game-status">Player 1's Turn</div>
                <button id="fullscreen-btn" class="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
            </div>
        </div>
        
        <div class="game-container">
            <div id="game-canvas-container">
                <canvas id="game-canvas"></canvas>
            </div>
        </div>
        
    </div>
    
    <div id="game-over-screen" class="screen">
        <div class="winner-announcement">
            <div class="trophy">🏆</div>
            <h1 id="winner-text">Player 1 Wins!</h1>
            <div class="winner-details" id="winner-details"></div>
            <button id="play-again-btn" class="play-again-btn">Play Again</button>
            <a href="../game/" class="back-btn">← Back to Games</a>
        </div>
    </div>

    <script type="module" src="bomberman.js"></script>
    <script>
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
}
</script>
</body>
</html>
