<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spring-Loaded Spin the Pen</title>
    <link href="https://fonts.useso.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a1a;
            --accent: #f1c40f;
            --accent-glow: rgba(241, 196, 15, 0.4);
            --player1: #e74c3c;
            --player2: #3498db;
            --player3: #2ecc71;
            --player4: #9b59b6;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* Animated background */
        body {
            background: #0a0a1a;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ─── Menu Screen ─── */
        #menu-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #07071a 100%);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #menu-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .menu-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .menu-subtitle {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            color: rgba(255,255,255,0.45);
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .menu-label {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }

        .player-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 50px;
        }

        .player-option {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: rgba(255,255,255,0.5);
        }

        .player-option:hover {
            border-color: rgba(241, 196, 15, 0.5);
            background: rgba(241, 196, 15, 0.08);
            color: rgba(255,255,255,0.8);
            transform: translateY(-4px);
        }

        .player-option.selected {
            border-color: #f1c40f;
            background: rgba(241, 196, 15, 0.15);
            color: #f1c40f;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.25);
            transform: translateY(-4px) scale(1.05);
        }

        .start-btn {
            padding: 16px 60px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #1a1a2e;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 8px 32px rgba(241, 196, 15, 0.3);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(241, 196, 15, 0.45);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* ─── Game Board ─── */
        #game-board {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Center hub */
        #center-hub {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #2a2a4a 0%, #1a1a2e 70%);
            border: 3px solid rgba(241, 196, 15, 0.3);
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.4);
            z-index: 9;
            pointer-events: none;
        }

        #center-hub::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 14px; height: 14px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, #f1c40f, #c0392b);
            box-shadow: 0 0 12px rgba(241, 196, 15, 0.6);
        }

        /* Table ring */
        #table-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.3), 0 0 80px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 2;
        }

        /* Pen */
        #pen-container {
            position: absolute;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
        }

        #pen {
            position: relative;
            width: 260px;
            height: 22px;
            border-radius: 11px;
            transition: box-shadow 0.15s;
            overflow: visible;
        }

        /* Pen body with metallic gradient */
        #pen-body {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 11px;
            background: linear-gradient(180deg,
                #8a8a8a 0%,
                #c0c0c0 15%,
                #f5f5f5 30%,
                #ffffff 45%,
                #e8e8e8 55%,
                #b0b0b0 75%,
                #808080 100%
            );
            box-shadow: 0 6px 18px rgba(0,0,0,0.5);
        }

        /* Pen stripe */
        #pen-body::after {
            content: '';
            position: absolute;
            left: 28%;
            top: 0;
            width: 18%;
            height: 100%;
            background: linear-gradient(180deg,
                rgba(231, 76, 60, 0.9) 0%,
                rgba(192, 57, 43, 0.9) 50%,
                rgba(231, 76, 60, 0.9) 100%
            );
        }

        /* Pen Tip */
        #pen-tip {
            position: absolute;
            right: -22px;
            top: 2px;
            width: 0;
            height: 0;
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            border-left: 22px solid #d0d0d0;
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.4));
        }

        #pen-tip::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -24px;
            width: 0;
            height: 0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-left: 8px solid #333;
        }

        /* Pen Cap */
        #pen-cap {
            position: absolute;
            left: -8px;
            top: -3px;
            width: 24px;
            height: 28px;
            background: linear-gradient(180deg, #444, #222, #111);
            border-radius: 6px 2px 2px 6px;
            box-shadow: -2px 3px 6px rgba(0,0,0,0.5);
        }

        #pen-cap::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 8px;
            height: 3px;
            background: rgba(241, 196, 15, 0.6);
            border-radius: 1px;
        }

        /* Tension arc (SVG overlay) */
        #tension-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 340px;
            height: 340px;
            pointer-events: none;
            z-index: 8;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #tension-indicator.visible {
            opacity: 1;
        }

        /* Players */
        .player {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
        }

        .player-inner {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .player-label {
            position: absolute;
            bottom: -22px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .player.winner .player-inner {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.2);
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.4), 0 0 80px rgba(46, 204, 113, 0.15);
            transform: scale(1.25);
        }

        .player.winner .player-label {
            color: #2ecc71;
        }

        /* Winner pulse ring */
        .player.winner::after {
            content: '';
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(46, 204, 113, 0.6);
            animation: pulseRing 1.5s ease-out infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Particle canvas */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            padding-top: 24px;
        }

        #instruction {
            font-size: clamp(0.85rem, 2vw, 1.15rem);
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            transition: all 0.4s ease;
        }

        #instruction.highlight {
            color: #2ecc71;
            font-weight: 500;
            letter-spacing: 3px;
        }

        /* Menu button in-game */
        #menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 25;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        #menu-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.25);
        }

        #menu-btn svg {
            width: 20px;
            height: 20px;
            fill: rgba(255,255,255,0.6);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .player-option {
                width: 58px;
                height: 58px;
                font-size: 1.5rem;
            }
            .player-inner {
                width: 54px;
                height: 54px;
                font-size: 18px;
            }
            .player {
                width: 62px;
                height: 62px;
            }
            #pen-container {
                width: 240px;
                height: 240px;
            }
            #pen {
                width: 200px;
            }
            #tension-indicator {
                width: 280px;
                height: 280px;
            }
            #center-hub {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- ═══ MENU SCREEN ═══ -->
<div id="menu-screen">
    <div class="menu-title">Spin the Pen</div>
    <div class="menu-subtitle">Spring-Loaded</div>

    <div class="menu-label">Number of Players</div>
    <div class="player-selector">
        <div class="player-option" data-count="2">2</div>
        <div class="player-option selected" data-count="3">3</div>
        <div class="player-option" data-count="4">4</div>
    </div>

    <button class="start-btn" id="start-btn">Start Game</button>
</div>

<!-- ═══ GAME ═══ -->
<div id="ui-layer">
    <div id="instruction">Drag pen in a circle to wind the spring</div>
</div>

<div id="game-board">
    <div id="table-ring"></div>
    <div id="center-hub"></div>
    <svg id="tension-indicator" viewBox="0 0 340 340">
        <circle cx="170" cy="170" r="160" fill="none" stroke="rgba(241,196,15,0.1)" stroke-width="6"/>
        <circle id="tension-arc" cx="170" cy="170" r="160" fill="none"
                stroke="url(#tensionGrad)" stroke-width="6"
                stroke-linecap="round"
                stroke-dasharray="0 1005"
                transform="rotate(-90 170 170)"/>
        <defs>
            <linearGradient id="tensionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f1c40f"/>
                <stop offset="100%" stop-color="#e74c3c"/>
            </linearGradient>
        </defs>
    </svg>

    <div id="pen-container">
        <div id="pen">
            <div id="pen-cap"></div>
            <div id="pen-body"></div>
            <div id="pen-tip"></div>
        </div>
    </div>
</div>

<button id="menu-btn" title="Back to menu">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
</button>

<script>
// ─── Constants ───
const PLAYER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#9b59b6'];
const PLAYER_NAMES  = ['Red', 'Blue', 'Green', 'Purple'];

// ─── DOM ───
const board          = document.getElementById('game-board');
const penContainer   = document.getElementById('pen-container');
const penEl          = document.getElementById('pen');
const instruction    = document.getElementById('instruction');
const tensionArc     = document.getElementById('tension-arc');
const tensionInd     = document.getElementById('tension-indicator');
const tableRing      = document.getElementById('table-ring');
const menuScreen     = document.getElementById('menu-screen');
const startBtn       = document.getElementById('start-btn');
const menuBtn        = document.getElementById('menu-btn');
const bgCanvas       = document.getElementById('bg-canvas');
const particleCanvas = document.getElementById('particle-canvas');
const bgCtx          = bgCanvas.getContext('2d');
const pCtx           = particleCanvas.getContext('2d');

// ─── Game State ───
let numPlayers     = 3;
let players        = [];
let isWinding      = false;
let baseRotation   = 0;
let windTension    = 0;
let lastMouseAngle = 0;
let currentVelocity= 0;
let isSpinning     = false;
let audioCtx       = null;
let lastTickAngle  = 0;
let particles      = [];
let stars          = [];

// ─── Menu Logic ───
document.querySelectorAll('.player-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.player-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        numPlayers = parseInt(opt.dataset.count);
    });
});

startBtn.addEventListener('click', startGame);
menuBtn.addEventListener('click', backToMenu);

function startGame() {
    menuScreen.classList.add('hidden');
    resetGame();
}

function backToMenu() {
    menuScreen.classList.remove('hidden');
    isSpinning = false;
    instruction.innerText = 'Drag pen in a circle to wind the spring';
    instruction.classList.remove('highlight');
}

function resetGame() {
    players.forEach(p => p.element.remove());
    players = [];
    baseRotation = 0;
    windTension = 0;
    currentVelocity = 0;
    isSpinning = false;
    isWinding = false;
    instruction.innerText = 'Drag pen in a circle to wind the spring';
    instruction.classList.remove('highlight');
    updatePenVisuals();
    createPlayers();
    positionTableRing();
}

// ─── Background Stars ───
function initBackground() {
    resizeCanvases();
    stars = [];
    for (let i = 0; i < 120; i++) {
        stars.push({
            x: Math.random() * bgCanvas.width,
            y: Math.random() * bgCanvas.height,
            r: Math.random() * 1.5 + 0.3,
            a: Math.random() * 0.6 + 0.1,
            speed: Math.random() * 0.0008 + 0.0003
        });
    }
}

function drawBackground(time) {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

    // Subtle radial glow at center
    const grd = bgCtx.createRadialGradient(
        bgCanvas.width / 2, bgCanvas.height / 2, 0,
        bgCanvas.width / 2, bgCanvas.height / 2, bgCanvas.width * 0.6
    );
    grd.addColorStop(0, 'rgba(26, 26, 62, 0.3)');
    grd.addColorStop(1, 'rgba(7, 7, 26, 0)');
    bgCtx.fillStyle = grd;
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

    stars.forEach(s => {
        const flicker = Math.sin(time * s.speed * 1000 + s.x) * 0.3 + 0.7;
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(255,255,255,${s.a * flicker})`;
        bgCtx.fill();
    });
}

// ─── Particle System ───
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.02 + 0.015,
            r: Math.random() * 3 + 1,
            color
        });
    }
}

function updateAndDrawParticles() {
    pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.life -= p.decay;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        pCtx.fillStyle = p.color.replace('1)', `${p.life})`);
        pCtx.fill();
    });
}

// ─── Audio ───
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playTickSound(velocity) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300 + Math.abs(velocity) * 12, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
    const volume = Math.min(0.4, Math.abs(velocity) / 25);
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.06);
}

function playWinnerSound() {
    if (!audioCtx) return;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.12);
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.12 + 0.4);
        osc.start(audioCtx.currentTime + i * 0.12);
        osc.stop(audioCtx.currentTime + i * 0.12 + 0.4);
    });
}

function playSpringSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

// ─── Players ───
function createPlayers() {
    const radiusX = Math.min(window.innerWidth * 0.35, 260);
    const radiusY = Math.min(window.innerHeight * 0.35, 220);
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    for (let i = 0; i < numPlayers; i++) {
        const angle = (i * (Math.PI * 2)) / numPlayers - Math.PI / 2; // Start from top
        const el = document.createElement('div');
        el.className = 'player';

        const inner = document.createElement('div');
        inner.className = 'player-inner';
        inner.style.borderColor = PLAYER_COLORS[i];
        inner.style.color = PLAYER_COLORS[i];
        inner.innerText = i + 1;

        const label = document.createElement('div');
        label.className = 'player-label';
        label.innerText = PLAYER_NAMES[i];

        el.appendChild(inner);
        el.appendChild(label);

        const x = centerX + radiusX * Math.cos(angle) - 36;
        const y = centerY + radiusY * Math.sin(angle) - 36;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;

        board.appendChild(el);
        players.push({
            element: el,
            angle: ((angle * 180 / Math.PI) + 360) % 360,
            color: PLAYER_COLORS[i]
        });
    }
}

function positionTableRing() {
    const radiusX = Math.min(window.innerWidth * 0.35, 260);
    const radiusY = Math.min(window.innerHeight * 0.35, 220);
    const size = Math.max(radiusX, radiusY) * 2 + 100;
    tableRing.style.width = `${size}px`;
    tableRing.style.height = `${size}px`;
    tableRing.style.left = `${window.innerWidth / 2 - size / 2}px`;
    tableRing.style.top = `${window.innerHeight / 2 - size / 2}px`;
}

// ─── Math / Visuals ───
function getAngleFromCenter(clientX, clientY) {
    const rect = penContainer.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI);
}

function updatePenVisuals() {
    const totalRotation = baseRotation + windTension;
    penContainer.style.transform = `rotate(${totalRotation}deg)`;

    // Tension glow
    const t = Math.min(Math.abs(windTension) / 600, 1);
    if (isWinding) {
        penEl.style.boxShadow = `
            0 0 ${20 + t * 40}px rgba(231, 76, 60, ${0.3 + t * 0.5}),
            0 6px 18px rgba(0,0,0,0.5)
        `;
    } else {
        penEl.style.boxShadow = '0 6px 18px rgba(0,0,0,0.5)';
    }

    // Tension arc SVG
    const circumference = 2 * Math.PI * 160; // r=160
    const arcLength = (t * circumference * 0.75).toFixed(1);
    const remaining = (circumference - arcLength).toFixed(1);
    tensionArc.setAttribute('stroke-dasharray', `${arcLength} ${remaining}`);
}

// ─── Input Handling ───
function startInteraction(e) {
    if (isSpinning) return;
    initAudio();
    e.preventDefault();

    players.forEach(p => p.element.classList.remove('winner'));
    instruction.innerText = 'Release to spin!';
    instruction.classList.remove('highlight');
    instruction.style.opacity = '1';

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    isWinding = true;
    windTension = 0;
    lastMouseAngle = getAngleFromCenter(clientX, clientY);
    tensionInd.classList.add('visible');
}

function moveInteraction(e) {
    if (!isWinding) return;
    e.preventDefault();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    let currentMouseAngle = getAngleFromCenter(clientX, clientY);
    let deltaAngle = currentMouseAngle - lastMouseAngle;

    if (deltaAngle > 180) deltaAngle -= 360;
    if (deltaAngle < -180) deltaAngle += 360;

    windTension += deltaAngle;
    lastMouseAngle = currentMouseAngle;

    updatePenVisuals();

    // Spawn small winding particles at center
    if (Math.abs(deltaAngle) > 2) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const totalRot = (baseRotation + windTension) * Math.PI / 180;
        spawnParticles(
            cx + Math.cos(totalRot) * 30,
            cy + Math.sin(totalRot) * 30,
            'rgba(241, 196, 15, 1)', 1
        );
    }
}

function endInteraction() {
    if (!isWinding) return;
    isWinding = false;
    tensionInd.classList.remove('visible');

    if (Math.abs(windTension) > 20) {
        playSpringSound();
        const randomFactor = 0.9 + Math.random() * 0.2;
        currentVelocity = -(windTension / 15) * randomFactor;
        baseRotation += windTension;
        windTension = 0;
        isSpinning = true;
        updatePenVisuals();
        requestAnimationFrame(spinPhysics);
    } else {
        windTension = 0;
        updatePenVisuals();
        instruction.innerText = 'Drag pen in a circle to wind the spring';
        instruction.style.opacity = '0.5';
    }
}

penContainer.addEventListener('touchstart', startInteraction, { passive: false });
document.addEventListener('touchmove', moveInteraction, { passive: false });
document.addEventListener('touchend', endInteraction);
penContainer.addEventListener('mousedown', startInteraction);
document.addEventListener('mousemove', moveInteraction);
document.addEventListener('mouseup', endInteraction);

// ─── Physics ───
function spinPhysics() {
    baseRotation += currentVelocity;
    currentVelocity *= 0.984;
    updatePenVisuals();

    // Tick sound
    if (Math.abs(baseRotation - lastTickAngle) > 15) {
        playTickSound(currentVelocity);

        // Spawn trailing particles from pen tip
        const totalRot = baseRotation * Math.PI / 180;
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const tipDist = 130;
        spawnParticles(
            cx + Math.cos(totalRot) * tipDist,
            cy + Math.sin(totalRot) * tipDist,
            'rgba(200, 200, 255, 1)', 2
        );

        lastTickAngle = baseRotation;
    }

    if (Math.abs(currentVelocity) < 0.1) {
        isSpinning = false;
        determineWinner();
        return;
    }

    requestAnimationFrame(spinPhysics);
}

// ─── Winner Logic ───
function determineWinner() {
    let finalAngle = baseRotation % 360;
    if (finalAngle < 0) finalAngle += 360;

    let closestPlayer = null;
    let minDiff = Infinity;

    players.forEach(player => {
        let diff = Math.abs(finalAngle - player.angle);
        if (diff > 180) diff = 360 - diff;
        if (diff < minDiff) {
            minDiff = diff;
            closestPlayer = player;
        }
    });

    if (closestPlayer) {
        closestPlayer.element.classList.add('winner');
        playWinnerSound();
        instruction.innerText = `Player ${closestPlayer.element.querySelector('.player-inner').innerText} (${PLAYER_NAMES[players.indexOf(closestPlayer)]}) Selected!`;
        instruction.classList.add('highlight');
        instruction.style.opacity = '1';

        // Winner particles burst
        const rect = closestPlayer.element.getBoundingClientRect();
        const px = rect.left + rect.width / 2;
        const py = rect.top + rect.height / 2;
        const color = closestPlayer.color;
        spawnParticles(px, py, `rgba(46, 204, 113, 1)`, 30);
        spawnParticles(px, py, color.replace('#', 'rgba(') ? `rgba(${parseInt(color.slice(1,3),16)}, ${parseInt(color.slice(3,5),16)}, ${parseInt(color.slice(5,7),16)}, 1)` : 'rgba(255,255,255,1)', 20);
    }
}

// ─── Canvas Resize ───
function resizeCanvases() {
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
}

// ─── Main Loop ───
function mainLoop(time) {
    drawBackground(time);
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}

// ─── Resize Handler ───
window.addEventListener('resize', () => {
    resizeCanvases();
    initBackground();
    players.forEach(p => p.element.remove());
    players = [];
    createPlayers();
    positionTableRing();
});

// ─── Init ───
resizeCanvases();
initBackground();
positionTableRing();
requestAnimationFrame(mainLoop);
</script>
</body>
