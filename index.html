<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Phonics Game Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            color-scheme: light !important;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            touch-action: manipulation;
            padding: 15px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .gateway-btn {
            border: none;
            border-radius: 25px;
            padding: 30px;
            font-size: 5rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gateway-btn:active {
            transform: scale(0.95);
        }

        .gateway-btn span {
            font-size: 2rem;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 10px;
        }

        .btn-wheel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-phonics {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-games {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-spinner {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }

        @media (max-width: 600px) {
            .gateway-btn { 
                font-size: 1.8rem;
            }
        }

        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="buttons-grid">
        <a class="gateway-btn btn-wheel" href="wheel.html">
            🎡 Wheel
            <span>Spin the Wheel</span>
        </a>

        <a class="gateway-btn btn-phonics" href="phonics.html">
            📖 Phonics
            <span>Word Grid Game</span>
        </a>

        <a class="gateway-btn btn-games" href="games/index.html">
            🎮 Games
            <span>Mini Games</span>
        </a>

        <a class="gateway-btn btn-spinner" href="bottle.html">
            🎯 Spinner
            <span>Bottle Spin</span>
        </a>
    </div>

    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
