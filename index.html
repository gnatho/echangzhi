<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Word Grid Game - Upgraded</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="version">v1.1 (Upgraded)</div>
    <button class="spin-wheel-btn" onclick="openWheelModal()">Spin Wheel</button>

    <div class="wheel-modal" id="wheelModal">
        <button class="wheel-close-btn" onclick="closeWheelModal()">×</button>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel"></div>
            <button class="wheel-spin-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
        </div>
    </div>

    <div id="fullscreenResult" class="fullscreen-result" onclick="closeFullscreenResult()">
        <div id="fsResultText" class="result-text">+3</div>
        <div class="tap-continue">Tap anywhere to continue</div>
    </div>

    <div class="controls">
        <select id="modeSelector">
            <option value="phonemes">Phonics</option>
            <option value="levels">Levels</option>
            <option value="grammar">Grammar</option>
        </select>
        <select id="wordSetSelector">
            <option value="shortVowels">Short Vowels</option>
            <option value="longA">Long A</option>
            <option value="longE">Long E</option>
            <option value="longI">Long I</option>
            <option value="longO">Long O</option>
            <option value="longU">Long U</option>
            <option value="rControlled">R-Controlled</option>
            <option value="diphthongs">Diphthongs</option>
            <option value="digraphs">Digraphs</option>
            <option value="beginBlends">Begin Blends</option>
            <option value="endBlends">End Blends</option>
            <option value="arWords">R as in are</option>
            <option value="orWords">OR as in ore</option>
        </select>
        <select id="levelSelector" style="display: none;">
            <option value="0">Level 0</option>
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
            <option value="5">Level 5</option>
            <option value="6">Level 6</option>
        </select>
        <select id="unitSelector" style="display: none;">
            <option value="0">Unit 0</option>
            <option value="1">Unit 1</option>
            <option value="2">Unit 2</option>
            <option value="3">Unit 3</option>
            <option value="4">Unit 4</option>
            <option value="5">Unit 5</option>
            <option value="6">Unit 6</option>
            <option value="7">Unit 7</option>
            <option value="8">Unit 8</option>
            <option value="9">Unit 9</option>
        </select>
        <select id="grammarActivitySelector" style="display: none;">
            <option value="reorder">Sentence Reorder</option>
            <option value="fill">Fill in Blank</option>
            <option value="spelling">Spelling</option>
        </select>
        <!-- Spelling-specific toggles (hidden by default) -->
        <select id="keyboardModeSelector" style="display: none;">
            <option value="full">Full Keyboard</option>
            <option value="limited">Only Given Letters</option>
        </select>
        <button id="pictureToggleBtn" class="control-btn" style="display: none; padding: 6px 12px; font-size: 14px;" onclick="togglePicture()">📷 Picture</button>
        <button id="audioToggleBtn" class="control-btn" style="display: none; padding: 6px 12px; font-size: 14px;" onclick="toggleAudio()">🔊 Audio</button>
        <button class="control-btn" onclick="resetGrid()">Reset Grid</button>
    </div>

    <div class="grid-container" id="grid"></div>
    
    <!-- Grammar Activity Container -->
    <div class="grammar-container" id="grammarContainer" style="display: none;"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
